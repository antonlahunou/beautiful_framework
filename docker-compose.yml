version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: gorest_test_db
    environment:
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: test_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: